# Render blueprint — one-click deploy.
#
# After your repo is on GitHub, point Render at this file:
#   Dashboard → New + → Blueprint → pick the ashby-mcp repo
# Render auto-provisions the service with everything below. You fill in
# ASHBY_API_KEY and MCP_BEARER_TOKEN in the Render UI when prompted
# (both are marked `sync: false` so they're never committed to git).
services:
  - type: web
    name: ashby-mcp
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: ashby
    healthCheckPath: /healthz
    envVars:
      - key: MCP_TRANSPORT
        value: http
      - key: MCP_HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ASHBY_API_KEY
        sync: false   # Set in Render UI — your Ashby team API key
      - key: MCP_BEARER_TOKEN
        sync: false   # Set in Render UI — a long random token (e.g. `openssl rand -hex 24`)
